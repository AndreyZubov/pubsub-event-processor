name: pubsub-event-processor

services:
  postgres:
    image: postgres:16-alpine
    container_name: pubsub-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pubsub
    ports:
      # Bound to localhost only and on 5433 to avoid colliding with a host
      # Postgres on the default 5432 port.
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pubsub"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
    name: pubsub-postgres-data
