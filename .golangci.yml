version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - gosec
    - revive
    - staticcheck
    - ineffassign
    - unused
    - loggercheck
    - bodyclose
    - contextcheck
    - errorlint
    - misspell
    - nilerr
    - noctx
    - unconvert
    - unparam
  settings:
    revive:
      rules:
        - name: var-naming
        - name: exported
        - name: package-comments
        - name: error-return
        - name: error-naming
        - name: if-return
        - name: redefines-builtin-id
        - name: unused-parameter
        - name: empty-block
    gosec:
      excludes:
        - G104
    loggercheck:
      zap: true
      sugar: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - unparam
          - bodyclose
          - noctx

formatters:
  enable:
    - gofumpt
    - gci
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/AndreyZubov/pubsub-event-processor)
      custom-order: true
    gofumpt:
      extra-rules: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
